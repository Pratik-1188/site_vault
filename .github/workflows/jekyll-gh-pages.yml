name: Build and Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main # Change this to 'master' if your default branch uses master

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java (Required for some Flutter tasks)
        uses: actions/setup-java@v3
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # Speeds up subsequent pipeline builds

      - name: Install Dependencies
        run: flutter pub get

      - name: Inject Production Configurations Dynamically
        run: |
          mkdir -p config
          echo '${{ secrets.PROD_CONFIG }}' > config/prod.json

      - name: Build Flutter Web
        # The --base-href flag must match your GitHub pages project subpath: /site_vault/
        run: |
          flutter build web --release --base-href "/site_vault/" --dart-define-from-file=config/prod.json

      - name: Upload Build Artifact to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4